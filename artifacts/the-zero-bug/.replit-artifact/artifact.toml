kind = "web"
previewPath = "/"
title = "The Zero Bug — Software Agency"
version = "1.0.0"
id = "artifacts/the-zero-bug"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23005

[services.development]
run = "pnpm --filter @workspace/the-zero-bug run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/the-zero-bug", "run", "build" ]
publicDir = "artifacts/the-zero-bug/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23005"
BASE_PATH = "/"
